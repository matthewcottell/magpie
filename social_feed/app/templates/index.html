<html>
<head>
    <title>Social Feed</title>
</head>
<body>
    <h1>Latest Posts</h1>
    {% for post in posts %}
        <div class="post">
            <p><strong>{{ post.user.username }}</strong> posted at {{ post.created_at }}</p>
            <p>{{ post.content }}</p>
        </div>
    {% endfor %}
</body>
</html>
