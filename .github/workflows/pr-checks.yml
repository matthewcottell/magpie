name: PR Checks

on:
  pull_request:
    branches:
      - main  # Adjust based on your branch strategy

jobs:
  assign_reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Add reviewers
        uses: peter-evans/review-assigner@v2
        with:
          reviewers: 'matthewcottell'
  lint:
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff sqlfluff

      - name: Run Ruff (Python linter)
        run: ruff check .

      - name: Run SQLFluff (SQL linter)
        run: sqlfluff lint --dialect postgres  # Adjust dialect as needed
