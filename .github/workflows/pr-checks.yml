name: PR Checks

on:
  pull_request:
    branches:
      - main  # Adjust based on your branch strategy

jobs:
  lint:
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff sqlfluff

      - name: Run Ruff (Python linter)
        run: ruff check .

      - name: Run SQLFluff (SQL linter)
        run: sqlfluff lint --dialect postgres  # Adjust dialect as needed
