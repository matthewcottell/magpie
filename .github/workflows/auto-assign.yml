name: "Auto Assign"
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-reviewers:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          reviewers: mattcottell
          assignees: matthewcottell
